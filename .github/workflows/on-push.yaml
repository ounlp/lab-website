name: on-push
run-name: on push to main

on:
  push:
    branches:
      - main

  # run if user manually requests it
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # refresh citations on push. the site itself is built and deployed by the
  # "Deploy Jekyll site to Pages" workflow (jekyll.yml) via GitHub Actions.
  update-citations:
    # skip first run because nothing enabled or setup yet
    if: github.run_number != 1
    uses: ./.github/workflows/update-citations.yaml
